        yes: Taip, gavau pasiūlymą
        no: Pasiūlymo negavau
        withdrawn: Pats pasitraukiau iš proceso
        notApplicable: Tai nebuvo atrankos procesas
    stageOptions:
      applied: Aplikacija / pradinis atrankos etapas
      recruiterScreen: Pokalbis su recruiteriu
      takeHome: Namų užduotis
      technicalInterview: Techninis interviu
      finalRound: Finalinis etapas / onsite
      selfDirected: Asmeninis ar tyrimo projektas
    taskTypeOptions:
      takeHome: Namų užduotis
      liveCoding: Live coding
      systemDesign: Sistemos dizainas
      bugFix: Bug fix
      featureBuild: Feature kūrimas
      research: Tyrimas arba analizė
    difficultyOptions:
      lightweight: Lengvas
      moderate: Vidutinis
      demanding: Sudėtingas
    reactionOptions:
      noResponse: Dar negauta atsakymo
      followUp: Gauti follow-up klausimai
      nextRound: Perėjau į kitą etapą
      positiveFeedback: Tik pozityvus feedback'as
      rejected: Atmesta po peržiūros
    action: Ruošti pateikimą
  login:
    label: Login
    title: Prisijungimas prie paskyros
    description: Pasiekite išsaugotus pateikimus, mėgstamiausius ir savo veiklą.
    email: El. paštas
    password: Slaptažodis
    action: Prisijungti
  about:
    label: About
    title: Apie Job Test Vault
    description: Job Test Vault padeda kaupti, tvarkyti ir peržiūrėti interviu bei atrankų užduočių medžiagą.
    details: Naudokite apatinę navigaciją, kad pereitumėte tarp atskirų paieškos, pateikimo, prisijungimo ir informacijos puslapių.
