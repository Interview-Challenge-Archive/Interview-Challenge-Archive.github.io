dock:
  search:
    label: Search
    title: Paieška saugykloje
    description: Ieškokite išsaugotų interviu užrašų, programavimo užduočių ir įmonių testų.
    fieldLabel: Paieškos užklausa
    hint: 'Pavyzdys: frontend, Vue, system design'
