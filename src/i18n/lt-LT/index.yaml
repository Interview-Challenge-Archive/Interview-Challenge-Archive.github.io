    description: Užfiksuokite visą istoriją apie repo, užduotį ar atrankos projektą, kad būtų aiškūs darbas, technologijos ir rezultatas.
    helper: Surinkite projekto pagrindus, techninį kontekstą, įmonės reakciją ir tai, ar procesas baigėsi darbo pasiūlymu.
    sections:
      basics: Projekto pagrindai
      technical: Techninė apimtis
      process: Procesas ir rezultatas
      notes: Išsamūs užrašai
    fields:
      entryTitle:
        label: Įrašo pavadinimas
        hint: Suteikite trumpą, lengvai randamą pavadinimą.
      company:
        label: Įmonė
        hint: Kas paskyrė ar įkvėpė šį projektą?
      role:
        label: Rolė / pozicija
        hint: Su kokia pozicija buvo susijusi ši užduotis?
      sourceUrl:
        label: Šaltinio nuoroda
        hint: Nuoroda į repo, užduoties aprašą arba darbo skelbimą.
      stage:
        label: Atrankos etapas
        hint: Kuriame proceso etape pasirodė ši užduotis?
      languages:
        label: Kalbos
        hint: Pridėkite vieną ar daugiau projekte naudotų kalbų.
      stack:
        label: Framework'ai, įrankiai ir bibliotekos
        hint: Pažymėkite pagrindinį stack'ą, servisus ar tooling'ą.
      taskType:
        label: Užduoties tipas
        hint: Kokio pobūdžio buvo ši užduotis?
      difficulty:
        label: Sudėtingumas
        hint: Pažymėkite, kiek sudėtingas atrodė darbas.
      timeLimit:
        label: Terminas arba numatytos pastangos
        hint: Įrašykite deadline'ą, laiko limitą ar valandų įvertį.
      submittedAt:
        label: Pateikimo data
        hint: Kada darbą išsiuntėte arba užbaigėte?
      reaction:
        label: Įmonės reakcija
        hint: Kaip įmonė sureagavo peržiūrėjusi darbą?
      taskSummary:
        label: Užduoties santrauka
        hint: Paprastai aprašykite užduotį, feature request'ą ar iššūkį.
      deliverables:
        label: Rezultatai ir ribojimai
        hint: Išvardykite reikalaujamas funkcijas, lūkesčius ar apribojimus.
      feedback:
        label: Gautas grįžtamasis ryšys
        hint: Išsaugokite recruiterio ar interviuotojo komentarus, net jei jie trumpi.
      lessons:
        label: Išmoktos pamokos
        hint: Ką kitą kartą patobulintumėte, pakartotumėte ar stebėtumėte?
      notes:
        label: Papildomi užrašai
        hint: Pridėkite nuorodas, follow-up klausimus, atlygio pastabas ar kitą naudingą informaciją.
    flags:
      submitted:
        label: Pateikiau darbą atgal įmonei
      publicRepo:
        label: Repo galima viešai dalintis
      nda:
        label: Taikomi NDA arba konfidencialumo ribojimai
