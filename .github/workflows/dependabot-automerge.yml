name: Dependabot auto-merge

on:
  workflow_run:
    workflows:
      - Lint
      - Tests
    types:
      - completed

concurrency:
  group: ${{ github.workflow }}-${{ github.event.workflow_run.head_repository.full_name || github.repository }}-${{ github.event.pull_request.head.ref || github.event.workflow_run.head_branch || github.head_ref || github.ref }}
  cancel-in-progress: true

permissions:
  actions: read
  contents: write
  pull-requests: write

jobs:
  automerge-dependabot:
    name: Enable Dependabot auto-merge
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event == 'pull_request'

    steps:
      - name: Check whether the Dependabot PR is ready to auto-merge
        id: eligibility
        uses: actions/github-script@v8
        with:
          script: |
            const acceptableConclusions = new Set(['success', 'neutral', 'skipped']);
            const run = context.payload.workflow_run;
            const prRef = run.pull_requests?.[0];

            if (!prRef) {
              core.info('No pull request is associated with this workflow run.');
              core.setOutput('should_merge', 'false');
              return;
            }

            const { data: pr } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prRef.number,
            });

            if (pr.user.login !== 'dependabot[bot]') {
              core.info(`PR #${pr.number} is not opened by Dependabot.`);
              core.setOutput('should_merge', 'false');
              return;
            }

            if (pr.head.sha !== run.head_sha) {
              core.info(`PR #${pr.number} has moved on to a newer head SHA.`);
              core.setOutput('should_merge', 'false');
              return;
            }

            const { data: workflowRuns } = await github.rest.actions.listWorkflowRunsForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              event: 'pull_request',
              head_sha: run.head_sha,
              per_page: 100,
            });

            const latestRunsByWorkflow = new Map();

            for (const workflowRun of workflowRuns.workflow_runs) {
              const current = latestRunsByWorkflow.get(workflowRun.workflow_id);
              const workflowRunTime = new Date(workflowRun.run_started_at ?? workflowRun.created_at).getTime();
              const currentTime = current
                ? new Date(current.run_started_at ?? current.created_at).getTime()
                : -1;

              if (!current || workflowRunTime > currentTime) {
                latestRunsByWorkflow.set(workflowRun.workflow_id, workflowRun);
              }
            }

            const blockingRuns = [...latestRunsByWorkflow.values()].filter((workflowRun) => {
              return !acceptableConclusions.has(workflowRun.conclusion ?? '');
            });

            if (blockingRuns.length > 0) {
              core.info(`Still waiting on workflow(s): ${blockingRuns.map((workflowRun) => `${workflowRun.name}=${workflowRun.conclusion ?? 'pending'}`).join(', ')}`);
              core.setOutput('should_merge', 'false');
              return;
            }

            core.setOutput('should_merge', 'true');
            core.setOutput('pr_number', String(pr.number));

      - name: Approve Dependabot PR
        if: steps.eligibility.outputs.should_merge == 'true'
        uses: peter-evans/approve-pull-request@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          pull-request-number: ${{ steps.eligibility.outputs.pr_number }}
          comment: "Automatically approving Dependabot PR after successful checks."

      - name: Enable auto-merge for Dependabot PRs
        if: steps.eligibility.outputs.should_merge == 'true'
        uses: peter-evans/enable-pull-request-automerge@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          pull-request-number: ${{ steps.eligibility.outputs.pr_number }}
          merge-method: squash
